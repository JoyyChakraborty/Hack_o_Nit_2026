<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compare Stocks — FinSight AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* Quick inline styles for the winner highlight */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
    .compare-col { background: #1c2230; padding: 25px; border-radius: 12px; text-align: center; border: 2px solid transparent; transition: all 0.3s ease; }
    .winner-highlight { border: 2px solid #00c853; box-shadow: 0 0 20px rgba(0, 200, 83, 0.2); transform: scale(1.02); }
    .big-score { font-size: 3rem; font-weight: bold; color: #fff; margin: 15px 0; }
   .compare-inputs { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; max-width: 100%; }
  .compare-inputs .text-input { flex: 1; min-width: 150px; max-width: 300px; }
    .vs-text { font-weight: bold; color: #888; }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">FinSight <span class="logo-ai">AI</span></a>
      <nav class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/results" class="nav-link">Analyze</a>
        <a href="/portfolio" class="nav-link">Portfolio</a>
        <a href="/compare" class="nav-link active">Compare</a>
      </nav>
    </div>
  </header>

  <main class="main-content page-content">
    <div class="page-header">
      <h1 class="page-title">Head-to-Head Comparison</h1>
      <p class="page-subtitle">Compare the AI sentiment of two stocks to see which is currently stronger.</p>
    </div>

    <div class="compare-inputs">
      <input type="text" id="stock1Input" class="text-input" placeholder="Stock 1 (e.g. TCS)">
      <span class="vs-text">VS</span>
      <input type="text" id="stock2Input" class="text-input" placeholder="Stock 2 (e.g. Infosys)">
      <button class="btn btn-primary" onclick="runComparison()">Compare</button>
    </div>

    <div class="loading-overlay" id="loadingSpinner" style="display:none; margin-top: 30px; text-align: center;">
      <p style="color: #00c853;">AI is analyzing both stocks...</p>
    </div>

    <div id="compareResults" class="compare-grid" style="display:none;">
      <div class="compare-col" id="col1">
        <h2 id="name1" style="color: #00c853;">---</h2>
        <div class="big-score" id="score1">0%</div>
        <p id="reason1" style="color: #aaa; font-size: 0.9rem;">---</p>
      </div>
      
      <div class="compare-col" id="col2">
        <h2 id="name2" style="color: #00c853;">---</h2>
        <div class="big-score" id="score2">0%</div>
        <p id="reason2" style="color: #aaa; font-size: 0.9rem;">---</p>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
